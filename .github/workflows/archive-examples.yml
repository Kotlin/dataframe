  name: Archive Example Projects

  on:
    push:
      branches:
        - master
      paths:
        - 'examples/projects/**'
        - '!examples/projects/dev/**'
    workflow_dispatch:

  jobs:
    build-archives:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Create archives in temp directory
          run: |
            mkdir -p /tmp/archives
            cd examples/projects
            for dir in */ ; do
              dirname="${dir%/}"
              if [ "$dirname" != "dev" ]; then
                echo "Archiving $dirname"
                cd "$dirname"
                zip -r "/tmp/archives/${dirname}.zip" . -x "*.git*" "build/*" ".gradle/*" "*/build/*" ".idea/*" "target/*"
                cd ..
              fi
            done

        - name: Checkout example-projects-archives branch
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            if git ls-remote --exit-code --heads origin example-projects-archives; then
              git fetch origin example-projects-archives
              git checkout example-projects-archives
            else
              git checkout --orphan example-projects-archives
              git rm -rf .
            fi

        - name: Update archives
          run: |
            git rm -f *.zip 2>/dev/null || true
            
            cp /tmp/archives/*.zip .
            
            CURRENT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
            
            cat > README.md << EOF
            # Kotlin DataFrame - Example Projects Archives
            
            Automatically generated archives of example projects.
            
            ## Available archives:
            EOF
            
            for zipfile in *.zip; do
              if [ "$zipfile" = "*.zip" ]; then continue; fi
              project_name="${zipfile%.zip}"
              title=$(echo "$project_name" | sed -r 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
              
              cat >> README.md << EOF
            
            ### $title
            
            **Download:** [$zipfile](https://github.com/Kotlin/dataframe/raw/example-projects-archives/$zipfile)
            EOF
            done
            
            cat >> README.md << EOF
            
            ---
            
            Last updated: $CURRENT_DATE
            
            Source commit: ${{ github.sha }}
            EOF
            
            git add .
            git commit -m "Update example archives from ${{ github.sha }}" || echo "No changes to commit"

        - name: Push to example-projects-archives branch
          run: |
            git push -f origin example-projects-archives
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
